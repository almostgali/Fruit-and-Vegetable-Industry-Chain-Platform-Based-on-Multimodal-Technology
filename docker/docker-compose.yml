services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: fruit-recognition-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      # Override database URL to point to the mysql service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/fruit_recognition?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      # Ensure model paths are correct inside the container
      - MODEL_QUALITY_PATH=/app/models/fruit_quality_yolo.pt
      - MODEL_MATURITY_PATH=/app/models/fruit_freshness_yolo.pt
      - UPLOAD_PATH=/app/uploads/
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mysql
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: fruit-recognition-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=fruit_recognition
      - TZ=Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Mount initialization scripts if any
      # - ../back/src/main/resources/sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
